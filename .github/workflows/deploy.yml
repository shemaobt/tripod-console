name: Deploy Tripod Console to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  GAR_REPO: tripod-console
  FRONTEND_SERVICE: tripod-console
  SECRETS_PROJECT: shemaobt-secrets

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-tripod-console
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.GCP_PROJECT_ID }}" ]; then echo "::error::GCP_PROJECT_ID is not set."; exit 1; fi
          if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then echo "::error::GCP_SA_KEY is not set."; exit 1; fi
          echo "Required secrets are set."

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker Auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build frontend image
        run: |
          docker build \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/frontend:${{ github.sha }} \
            .

      - name: Push frontend image
        run: docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/frontend:${{ github.sha }}

      - name: Fetch secrets from GCP Secret Manager
        id: secrets
        run: |
          BACKEND_URL=$(gcloud secrets versions access latest \
            --secret=tripod_console_backend_url \
            --project=${{ env.SECRETS_PROJECT }} | tr -d '\n')
          echo "backend_url=${BACKEND_URL}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.FRONTEND_SERVICE }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/frontend:${{ github.sha }} \
            --project ${{ env.PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory=256Mi \
            --cpu=1 \
            --concurrency=80 \
            --timeout=60 \
            --set-env-vars="BACKEND_URL=${{ steps.secrets.outputs.backend_url }}"

      - name: Show deployment URL
        run: |
          URL=$(gcloud run services describe ${{ env.FRONTEND_SERVICE }} \
            --project ${{ env.PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --format="value(status.url)")
          echo "Deployed to: ${URL}"
